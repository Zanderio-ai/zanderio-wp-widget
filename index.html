<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zanderio Widget — Dev Harness</title>
  </head>
  <body>
    <!--
      Local dev harness. In production the widget is loaded as a single
      <script src=".../loader.js" data-id="wdg_..."> tag and
      self-mounts. Here we simulate that with the dev key below.
    -->
    <script>
      window.ZanderioWidgetConfig = { key: "pk_dev_local" };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
